<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numera — 數位服務報價</title>
<meta name="description" content="Numera 提供網站設計開發、APP 開發、後台系統、UI/UX 設計、品牌設計、電商系統等數位服務，透明模組化報價。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0F1A;
    --bg2: #111827;
    --bg3: #1a2235;
    --fg: #F5F4F0;
    --fg2: rgba(245,244,240,0.6);
    --fg3: rgba(245,244,240,0.3);
    --accent: #E8A44A;
    --accent2: #d4943a;
    --border: rgba(245,244,240,0.08);
    --radius: 4px;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-sans: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 72px;
    background: rgba(11,15,26,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  .nav-logo { font-family: var(--font-serif); font-size: 1.5rem; letter-spacing: -0.01em; color: var(--fg); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { color: var(--fg2); text-decoration: none; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--fg); }
  .nav-cta { display: flex; gap: 12px; align-items: center; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--fg2); padding: 8px 20px; border-radius: var(--radius); font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; text-decoration: none; display: inline-block; }
  .btn-ghost:hover { border-color: var(--fg3); color: var(--fg); }
  .btn-primary { background: var(--accent); border: none; color: #0B0F1A; padding: 9px 22px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; text-decoration: none; display: inline-block; letter-spacing: 0.01em; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  /* Hero */
  .hero {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 120px 48px 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(232,164,74,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(100,120,200,0.05) 0%, transparent 60%);
  }
  .hero-inner { position: relative; z-index: 1; text-align: center; max-width: 900px; }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(232,164,74,0.1); border: 1px solid rgba(232,164,74,0.25);
    color: var(--accent); padding: 6px 16px; border-radius: 100px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 32px;
  }
  .hero-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .hero h1 {
    font-family: var(--font-serif); font-size: clamp(3rem, 7vw, 5.5rem);
    line-height: 1.08; letter-spacing: -0.02em; margin-bottom: 28px;
    color: var(--fg);
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero-sub { font-size: 1.15rem; color: var(--fg2); max-width: 560px; margin: 0 auto 44px; line-height: 1.7; font-weight: 300; }
  .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-lg { padding: 14px 32px; font-size: 1rem; border-radius: var(--radius); }
  .hero-stats { display: flex; gap: 48px; justify-content: center; margin-top: 72px; padding-top: 48px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat-item { text-align: center; }
  .stat-num { font-family: var(--font-serif); font-size: 2.2rem; color: var(--fg); letter-spacing: -0.02em; }
  .stat-label { font-size: 0.8rem; color: var(--fg2); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

  /* Section styles */
  section { padding: 100px 48px; max-width: 1200px; margin: 0 auto; }
  .section-tag { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .section-title { font-family: var(--font-serif); font-size: clamp(2rem, 4vw, 3rem); line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px; }
  .section-sub { color: var(--fg2); font-size: 1rem; line-height: 1.7; max-width: 520px; }

  /* Services */
  #services { max-width: 100%; padding: 100px 0; }
  .services-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin-top: 60px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .service-card {
    background: var(--bg2); padding: 40px 36px;
    transition: background 0.2s;
    cursor: default;
  }
  .service-card:hover { background: var(--bg3); }
  .service-icon { width: 44px; height: 44px; border-radius: 8px; background: rgba(232,164,74,0.1); border: 1px solid rgba(232,164,74,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 1.2rem; }
  .service-title { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 10px; }
  .service-desc { font-size: 0.88rem; color: var(--fg2); line-height: 1.7; margin-bottom: 20px; }
  .service-price { font-size: 0.82rem; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; }
  .service-modules { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .module-tag { font-size: 0.72rem; background: rgba(245,244,240,0.05); border: 1px solid var(--border); color: var(--fg2); padding: 3px 10px; border-radius: 100px; }

  /* Quote Calculator */
  #calculator { max-width: 100%; background: var(--bg2); padding: 0; }
  .calc-wrapper { max-width: 1200px; margin: 0 auto; padding: 100px 48px; }
  .calc-layout { display: grid; grid-template-columns: 1fr 420px; gap: 60px; margin-top: 60px; align-items: start; }
  .calc-modules { display: flex; flex-direction: column; gap: 24px; }
  .calc-cat-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg3); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .calc-items { display: flex; flex-direction: column; gap: 2px; }
  .calc-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: var(--radius); cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .calc-item:hover { background: rgba(245,244,240,0.04); }
  .calc-item.selected { background: rgba(232,164,74,0.08); border-color: rgba(232,164,74,0.2); }
  .calc-item-left { display: flex; align-items: center; gap: 12px; }
  .calc-checkbox {
    width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--fg3);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .calc-item.selected .calc-checkbox { background: var(--accent); border-color: var(--accent); }
  .calc-item-name { font-size: 0.9rem; font-weight: 500; }
  .calc-item-name small { display: block; font-size: 0.78rem; color: var(--fg2); font-weight: 400; margin-top: 1px; }
  .calc-item-price { font-size: 0.88rem; color: var(--fg2); font-weight: 400; white-space: nowrap; }
  .calc-item.selected .calc-item-price { color: var(--accent); }

  /* Quote Panel */
  .quote-panel {
    position: sticky; top: 88px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 36px; overflow: hidden;
  }
  .quote-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .quote-title { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 24px; }
  .quote-items { min-height: 80px; margin-bottom: 24px; }
  .quote-line { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .quote-line-name { color: var(--fg2); }
  .quote-line-price { color: var(--fg); font-weight: 500; }
  .quote-empty { color: var(--fg3); font-size: 0.85rem; font-style: italic; }
  .quote-divider { height: 1px; background: var(--border); margin: 20px 0; }
  .quote-subtotal { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.88rem; color: var(--fg2); }
  .quote-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; }
  .quote-total-label { font-size: 0.9rem; color: var(--fg2); }
  .quote-total-price { font-family: var(--font-serif); font-size: 2rem; color: var(--fg); letter-spacing: -0.02em; }
  .quote-total-price span { font-size: 1rem; color: var(--fg2); font-family: var(--font-sans); }
  .quote-form { display: flex; flex-direction: column; gap: 12px; }
  .form-input {
    background: rgba(245,244,240,0.05); border: 1px solid var(--border);
    color: var(--fg); padding: 11px 14px; border-radius: var(--radius);
    font-family: var(--font-sans); font-size: 0.88rem;
    transition: border-color 0.2s; width: 100%;
  }
  .form-input:focus { outline: none; border-color: rgba(232,164,74,0.4); }
  .form-input::placeholder { color: var(--fg3); }
  .quote-send { width: 100%; padding: 13px; background: var(--accent); color: #0B0F1A; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; letter-spacing: 0.01em; }
  .quote-send:hover { background: var(--accent2); }
  .quote-note { font-size: 0.75rem; color: var(--fg3); text-align: center; margin-top: 12px; line-height: 1.5; }

  /* Portfolio */
  .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 60px; }
  .portfolio-card {
    border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
    background: var(--bg2); transition: transform 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .portfolio-card:hover { transform: translateY(-4px); border-color: rgba(232,164,74,0.2); }
  .portfolio-thumb {
    height: 200px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; color: var(--fg3); font-family: monospace; letter-spacing: 0.05em;
    text-align: center; line-height: 1.8;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(245,244,240,0.03) 19px, rgba(245,244,240,0.03) 20px),
                      repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(245,244,240,0.03) 19px, rgba(245,244,240,0.03) 20px);
  }
  .portfolio-info { padding: 20px 22px; }
  .portfolio-cat { font-size: 0.72rem; color: var(--accent); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .portfolio-name { font-family: var(--font-serif); font-size: 1.1rem; margin-bottom: 8px; }
  .portfolio-desc { font-size: 0.82rem; color: var(--fg2); line-height: 1.6; }

  /* FAQ */
  .faq-list { margin-top: 48px; display: flex; flex-direction: column; gap: 2px; }
  .faq-item { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .faq-q {
    padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; font-weight: 500; font-size: 0.95rem;
    transition: background 0.15s;
  }
  .faq-q:hover { background: rgba(245,244,240,0.03); }
  .faq-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; transition: transform 0.2s; }
  .faq-item.open .faq-icon { transform: rotate(45deg); }
  .faq-a { padding: 0 24px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s; font-size: 0.88rem; color: var(--fg2); line-height: 1.75; }
  .faq-item.open .faq-a { max-height: 200px; padding: 4px 24px 20px; }

  /* About */
  .about-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; margin-top: 60px; }
  .about-visual {
    height: 400px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; color: var(--fg3); font-family: monospace; letter-spacing: 0.05em;
    text-align: center; line-height: 1.8;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,244,240,0.03) 39px, rgba(245,244,240,0.03) 40px),
                      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,244,240,0.03) 39px, rgba(245,244,240,0.03) 40px);
  }
  .about-text p { color: var(--fg2); line-height: 1.8; margin-bottom: 20px; font-size: 0.95rem; }
  .about-values { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
  .value-item { display: flex; gap: 14px; align-items: flex-start; }
  .value-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 8px; flex-shrink: 0; }
  .value-text { font-size: 0.88rem; color: var(--fg2); line-height: 1.6; }
  .value-text strong { color: var(--fg); }

  /* Contact */
  #contact { max-width: 100%; background: var(--bg2); padding: 0; }
  .contact-wrapper { max-width: 1200px; margin: 0 auto; padding: 100px 48px; }
  .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 60px; }
  .contact-info h3 { font-family: var(--font-serif); font-size: 1.8rem; margin-bottom: 20px; line-height: 1.2; }
  .contact-info p { color: var(--fg2); font-size: 0.9rem; line-height: 1.8; margin-bottom: 32px; }
  .contact-details { display: flex; flex-direction: column; gap: 14px; }
  .contact-detail { display: flex; gap: 12px; align-items: center; font-size: 0.88rem; }
  .contact-detail-icon { width: 32px; height: 32px; border-radius: 6px; background: rgba(232,164,74,0.1); border: 1px solid rgba(232,164,74,0.15); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
  .contact-detail-text { color: var(--fg2); }
  .contact-form { display: flex; flex-direction: column; gap: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 0.8rem; color: var(--fg2); font-weight: 500; letter-spacing: 0.03em; }
  .form-textarea { resize: vertical; min-height: 120px; }

  /* Footer */
  footer {
    border-top: 1px solid var(--border); padding: 40px 48px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 100%;
  }
  .footer-logo { font-family: var(--font-serif); font-size: 1.2rem; color: var(--fg2); }
  .footer-logo span { color: var(--accent); }
  .footer-links { display: flex; gap: 28px; }
  .footer-links a { font-size: 0.82rem; color: var(--fg3); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--fg2); }
  .footer-copy { font-size: 0.78rem; color: var(--fg3); }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; right: 32px; z-index: 999;
    background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    padding: 16px 20px; border-radius: var(--radius);
    font-size: 0.88rem; color: var(--fg2);
    transform: translateX(120%); transition: transform 0.3s ease;
    max-width: 280px;
  }
  .toast.show { transform: translateX(0); }
  .toast strong { color: var(--fg); display: block; margin-bottom: 4px; }

  /* Mobile hamburger */
  .nav-hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    background: none; border: none; padding: 4px;
  }
  .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--fg2); border-radius: 2px; transition: all 0.2s; }
  .mobile-menu {
    display: none; position: fixed; top: 72px; left: 0; right: 0; z-index: 99;
    background: rgba(11,15,26,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px; flex-direction: column; gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { color: var(--fg2); text-decoration: none; font-size: 1rem; font-weight: 500; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover { color: var(--fg); }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-hamburger { display: flex; }
    section { padding: 60px 20px; }
    .hero { padding: 100px 20px 60px; }
    .services-grid { grid-template-columns: 1fr; }
    .calc-layout { grid-template-columns: 1fr; }
    .portfolio-grid { grid-template-columns: 1fr; }
    .about-layout, .contact-layout { grid-template-columns: 1fr; gap: 40px; }
    footer { flex-direction: column; gap: 16px; text-align: center; padding: 32px 20px; }
    .hero-stats { gap: 24px; }
    .services-wrapper, .calc-wrapper, .contact-wrapper { padding-left: 20px; padding-right: 20px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav id="main-nav">
  <a href="#" class="nav-logo">numera<span>.</span></a>
  <ul class="nav-links">
    <li><a href="#services">服務項目</a></li>
    <li><a href="#calculator">線上報價</a></li>
    <li><a href="#portfolio">作品集</a></li>
    <li><a href="#about">關於我們</a></li>
    <li><a href="#faq">FAQ</a></li>
    <li><a href="#contact">聯絡</a></li>
  </ul>
  <div class="nav-cta">
    <button class="nav-hamburger" id="hamburger" aria-label="選單">
      <span></span><span></span><span></span>
    </button>
    <a href="#calculator" class="btn-primary" style="display:none" id="nav-quote-btn">立即報價</a>
  </div>
</nav>

<!-- Mobile menu -->
<nav class="mobile-menu" id="mobile-menu">
  <a href="#services" onclick="closeMobileMenu()">服務項目</a>
  <a href="#calculator" onclick="closeMobileMenu()">線上報價</a>
  <a href="#portfolio" onclick="closeMobileMenu()">作品集</a>
  <a href="#about" onclick="closeMobileMenu()">關於我們</a>
  <a href="#faq" onclick="closeMobileMenu()">FAQ</a>
  <a href="#contact" onclick="closeMobileMenu()">聯絡</a>
</nav>

<!-- App root -->
<div id="root"></div>

<!-- Toast -->
<div class="toast" id="toast">
  <strong>報價申請已送出！</strong>
  我們將在 24 小時內與您聯繫。
</div>

<script>
  // Mobile menu toggle
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('open');
  });
  function closeMobileMenu() {
    mobileMenu.classList.remove('open');
  }

  // Show/hide desktop quote button based on screen size
  function updateNavQuoteBtn() {
    const btn = document.getElementById('nav-quote-btn');
    if (window.innerWidth > 768) {
      btn.style.display = 'inline-block';
    } else {
      btn.style.display = 'none';
    }
  }
  updateNavQuoteBtn();
  window.addEventListener('resize', updateNavQuoteBtn);
</script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Data ──────────────────────────────────────────────────────────────────────

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

    <div className="service-card">
      <div className="service-icon">{s.icon}</div>

      <div style={{fontSize:'0.72rem',color:'var(--fg3)',marginBottom:'8px',letterSpacing:'0.04em'}}>{s.en}</div>

      <div className="service-modules">{s.modules.map(m => <span key={m} className="module-tag">{m}</span>)}</div>
    </div>

function Calculator() {
  const [selected, setSelected] = useState(new Set());
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [sent, setSent] = useState(false);

  const toggle = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const allItems = CALC_MODULES.flatMap(c => c.items);
  const selectedItems = allItems.filter(i => selected.has(i.id));
  const subtotal = selectedItems.reduce((s, i) => s + i.price, 0);
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + tax;

  const fmt = n => 'NT$' + n.toLocaleString('zh-TW');

  const handleSend = () => {
    if (!name || !email) return;
    setSent(true);
    showToast();
  };

  return (
    <div className="calc-layout">
      <div className="calc-modules">
        {CALC_MODULES.map(cat => (
          <div className="calc-category" key={cat.category}>
            <div className="calc-cat-title">{cat.category}</div>
            <div className="calc-items">
              {cat.items.map(item => (
                <div
                  key={item.id}
                  className={`calc-item ${selected.has(item.id) ? 'selected' : ''}`}
                  onClick={() => toggle(item.id)}
                >
                  <div className="calc-item-left">
                    <div className="calc-checkbox">
                      {selected.has(item.id) && (
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                          <path d="M2 5l2.5 2.5L8 3" stroke="#0B0F1A" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      )}
                    </div>
                    <div className="calc-item-name">
                      {item.name}
                      <small>{item.en} · {item.note}</small>
                    </div>
                  </div>
                  <div className="calc-item-price">{fmt(item.price)}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      <div className="quote-panel">
        <div className="quote-title">報價摘要</div>
        <div className="quote-items">
          {selectedItems.length === 0
            ? <div className="quote-empty">請從左側選擇服務項目</div>
            : selectedItems.map(i => (
                <div className="quote-line" key={i.id}>
                  <span className="quote-line-name">{i.name}</span>
                  <span className="quote-line-price">{fmt(i.price)}</span>
                </div>
              ))
          }
        </div>
        {selectedItems.length > 0 && (
          <>
            <div className="quote-subtotal">
              <span>小計 Subtotal</span><span>{fmt(subtotal)}</span>
            </div>
            <div className="quote-subtotal">
              <span>稅金 Tax (5%)</span><span>{fmt(tax)}</span>
            </div>
          </>
        )}
        <div className="quote-divider"></div>
        <div className="quote-total">
          <span className="quote-total-label">預估總額</span>
          <span className="quote-total-price">{fmt(total)}<span> TWD</span></span>
        </div>

        {!sent ? (
          <div className="quote-form">
            <input className="form-input" placeholder="您的姓名 Name *" value={name} onChange={e=>setName(e.target.value)} />
            <input className="form-input" placeholder="電子郵件 Email *" type="email" value={email} onChange={e=>setEmail(e.target.value)} />
            <input className="form-input" placeholder="聯絡電話 Phone" value={phone} onChange={e=>setPhone(e.target.value)} />
            <button className="quote-send" onClick={handleSend}>送出詢價單 →</button>
            <div className="quote-note">送出後 24 小時內回覆 · 免費諮詢</div>
          </div>
        ) : (
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:'2rem',marginBottom:'12px'}}>✓</div>
            <div style={{fontSize:'0.9rem',color:'var(--fg)',marginBottom:'8px',fontWeight:500}}>詢價單已送出！</div>
            <div style={{fontSize:'0.82rem',color:'var(--fg2)'}}>我們將於 24 小時內與您聯繫</div>
          </div>
        )}
      </div>
    </div>
  );
}

function ContactForm() {
  const [formData, setFormData] = useState({ name:'', email:'', company:'', service:'', message:'' });
  const [sent, setSent] = useState(false);

  const set = k => e => setFormData(prev => ({...prev, [k]: e.target.value}));

  const submit = () => {
    if (!formData.name || !formData.email) return;
    setSent(true);
    showToast();
  };

  if (sent) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'300px',gap:'12px',color:'var(--fg2)',textAlign:'center'}}>
      <div style={{fontSize:'2.5rem',color:'var(--accent)'}}>✓</div>
      <div style={{fontSize:'1rem',color:'var(--fg)',fontWeight:500}}>訊息已送出</div>
      <div style={{fontSize:'0.85rem'}}>感謝您的聯繫，我們將於 24 小時內回覆</div>
    </div>
  );

  return (
    <div className="contact-form">
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">姓名 Name *</label>
          <input className="form-input" value={formData.name} onChange={set('name')} />
        </div>
        <div className="form-group">
          <label className="form-label">公司 Company</label>
          <input className="form-input" value={formData.company} onChange={set('company')} />
        </div>
      </div>
      <div className="form-group">
        <label className="form-label">電子郵件 Email *</label>
        <input className="form-input" type="email" value={formData.email} onChange={set('email')} />
      </div>
      <div className="form-group">
        <label className="form-label">服務類型 Service</label>
        <select className="form-input" value={formData.service} onChange={set('service')}>
          <option value="">請選擇</option>
          {SERVICES.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
        </select>
      </div>
      <div className="form-group">
        <label className="form-label">需求說明 Message</label>
        <textarea className="form-input form-textarea" value={formData.message} onChange={set('message')} placeholder="請描述您的專案需求…" />
      </div>
      <button className="btn-primary btn-lg" onClick={submit} style={{width:'100%'}}>送出訊息 Send →</button>
    </div>
  );
}
